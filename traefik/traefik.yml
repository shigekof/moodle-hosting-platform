---
# Traefik v3.1 static configuration
# See: https://doc.traefik.io/traefik/

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true

  websecure:
    address: ":443"

certificatesResolvers:
  letsencrypt:
    acme:
      # email is set via TRAEFIK_CERTIFICATESRESOLVERS_LETSENCRYPT_ACME_EMAIL env var
      storage: /letsencrypt/acme.json
      httpChallenge:
        entryPoint: web

providers:
  docker:
    exposedByDefault: false
    network: moodle_network
  file:
    filename: /etc/traefik/dynamic.yml
    watch: true

# Security: dashboard disabled to prevent information disclosure (OWASP A05)
api:
  dashboard: false
