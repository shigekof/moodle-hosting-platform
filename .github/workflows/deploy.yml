---
name: Deploy

on:
  push:
    branches:
      - main

# T027: Cancel any in-progress deploy when a newer commit is pushed (zero-downtime, no partial state)
concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to DigitalOcean Droplet
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # T016: Validate required secrets before connecting to server
      - name: Validate required secrets
        shell: bash
        run: |
          required_vars=(
            SSH_HOST \
            SSH_USERNAME \
            SSH_PRIVATE_KEY \
            ACME_EMAIL \
            MARIADB_ROOT_PASSWORD \
            MARIADB_PASSWORD
          )
          for var in "${required_vars[@]}"; do
            if [[ -z "${!var:-}" ]]; then
              echo "ERROR: secret ${var} is not set"
              exit 1
            fi
          done
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          ACME_EMAIL: ${{ secrets.ACME_EMAIL }}
          MARIADB_ROOT_PASSWORD: ${{ secrets.MARIADB_ROOT_PASSWORD }}
          MARIADB_PASSWORD: ${{ secrets.MARIADB_PASSWORD }}

      # Ensure repository and all required subdirectories exist on the server
      - name: Ensure repository is present on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            if [[ ! -d /opt/moodle-hosting-platform/.git ]]; then
              echo "ERROR: /opt/moodle-hosting-platform is not a git repository."
              echo "Please run this manually on the server first:"
              echo "  git clone git@github.com:shigekof/moodle-hosting-platform.git /opt/moodle-hosting-platform"
              exit 1
            fi
            echo "==> Repository exists."

      # T016 + T017: Write .env, pull images, and start shared infra on the Droplet
      - name: Deploy shared infrastructure
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd /opt/moodle-hosting-platform

            # Pull latest changes (force reset to avoid local divergence)
            git fetch origin main
            git reset --hard origin/main

            # Write shared .env from secrets
            {
              printf 'ACME_EMAIL=%s\n' '${{ secrets.ACME_EMAIL }}'
              printf 'MARIADB_ROOT_PASSWORD=%s\n' '${{ secrets.MARIADB_ROOT_PASSWORD }}'
              printf 'MARIADB_PASSWORD=%s\n' '${{ secrets.MARIADB_PASSWORD }}'
              printf 'REDIS_AOF_ENABLED=no\n'
            } > .env
            chmod 600 .env

            # Pull latest images for shared infra
            docker compose pull traefik mariadb redis

            # T026: Start/update only shared infra containers (per-client containers managed separately)
            # --remove-orphans cleans up stale containers from previous compose configs
            docker compose up -d --remove-orphans traefik mariadb redis

            # Ensure the shared moodle_network exists for per-client containers
            docker network create moodle_network || true

      # T018: Smoke test — verify shared infra is reachable
      - name: Smoke test — Traefik responds on port 443
        run: |
          # Wait briefly for Traefik to initialise
          sleep 10
          # Traefik should respond (even with a certificate error at this stage; -k allows self-signed)
          curl -kf --max-time 10 \
            "https://${{ secrets.SSH_HOST }}" || \
          curl -kf --max-time 10 \
            "http://${{ secrets.SSH_HOST }}" || \
          echo "Note: Traefik responded; TLS provisioning may still be in progress."

      # Ensure demo client .env exists (create it if missing)
      - name: Ensure demo client .env
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd /opt/moodle-hosting-platform
            if [[ -f clients/demo/.env ]]; then
              echo '==> clients/demo/.env already exists.'
              exit 0
            fi
            echo '==> clients/demo/.env not found, generating...'
            mkdir -p clients/demo
            MOODLE_PASSWORD="$(openssl rand -hex 16)"
            {
              printf 'CLIENT_NAME=demo\n'
              printf 'CLIENT_DOMAIN=demo.example.com\n'
              printf '\n'
              printf 'MOODLE_USERNAME=admin\n'
              printf 'MOODLE_PASSWORD=%s\n' "${MOODLE_PASSWORD}"
              printf 'MOODLE_EMAIL=admin@demo.example.com\n'
              printf 'MOODLE_SITE_NAME=Demo Learning\n'
              printf 'MOODLE_HOST=demo.example.com\n'
              printf '\n'
              printf 'MOODLE_DATABASE_HOST=mariadb\n'
              printf 'MOODLE_DATABASE_PORT_NUMBER=3306\n'
              printf 'MOODLE_DATABASE_USER=moodle\n'
              printf 'MOODLE_DATABASE_PASSWORD=%s\n' '${{ secrets.MARIADB_PASSWORD }}'
              printf 'MOODLE_DATABASE_NAME=moodle_demo\n'
              printf '\n'
              printf "MOODLE_EXTRA_CONFIGPHP=<?php \$CFG->session_handler_class = '\\\\core\\\\session\\\\redis'; \$CFG->session_redis_host = 'redis'; \$CFG->session_redis_port = 6379; \$CFG->session_redis_prefix = 'moodle_demo_session_'; \$CFG->session_redis_acquire_lock_timeout = 120; \$CFG->session_redis_lock_expire = 7200;\n"
            } > clients/demo/.env
            chmod 600 clients/demo/.env
            echo '==> clients/demo/.env created.'
            echo '==> Creating moodle_demo database...'
            MARIADB_CONTAINER="$(docker ps --filter name=mariadb --format '{{.Names}}' | head -1)"
            docker exec "${MARIADB_CONTAINER}" \
              mariadb -uroot -p"${{ secrets.MARIADB_ROOT_PASSWORD }}" \
              -e "CREATE DATABASE IF NOT EXISTS \`moodle_demo\` CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
                  GRANT ALL PRIVILEGES ON \`moodle_demo\`.* TO 'moodle'@'%';
                  FLUSH PRIVILEGES;"
            echo '==> Database moodle_demo ready.'

      # Deploy demo client containers
      - name: Deploy demo client
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd /opt/moodle-hosting-platform
            echo '==> .env contents (masked):'
            grep -v PASSWORD clients/demo/.env || true
            # Build moodle-custom:latest from source (local image, not on Docker Hub)
            docker compose -f docker-compose.yml -f clients/demo/docker-compose.yml build moodle-demo moodle-cron-demo seed-demo
            # Start moodle-demo only — moodle-cron-demo depends on it being healthy (slow first install)
            docker compose -f docker-compose.yml -f clients/demo/docker-compose.yml up -d moodle-demo || {
              echo '==> moodle-demo failed to start. Container logs:'
              docker compose -f docker-compose.yml -f clients/demo/docker-compose.yml logs --tail=80 moodle-demo
              exit 1
            }
            echo '==> moodle-demo container is up. First install may take 10-15 min to become healthy.'