---
# Shared infrastructure: Traefik, MariaDB, Redis
# Per-client Moodle services are assembled via include: directives below.
# Add a new client by running: scripts/add-client.sh <name> <domain>

name: moodle-demo

services:
  traefik:
    image: traefik:v3.1
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_certs:/letsencrypt
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
    networks:
      - moodle_network
    labels:
      - "traefik.enable=false"

  mariadb:
    image: bitnami/mariadb:10.11
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MARIADB_DATABASE: moodle
      MARIADB_USER: moodle
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
      MARIADB_CHARACTER_SET: utf8mb4
      MARIADB_COLLATE: utf8mb4_unicode_ci
    volumes:
      - mariadb_data:/bitnami/mariadb
    networks:
      - moodle_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root",
             "--password=${MARIADB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: bitnami/redis:7.2
    restart: unless-stopped
    environment:
      ALLOW_EMPTY_PASSWORD: "yes"
      REDIS_AOF_ENABLED: ${REDIS_AOF_ENABLED:-no}
    volumes:
      - redis_data:/bitnami/redis/data
    networks:
      - moodle_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

# --- Per-client includes (added by scripts/add-client.sh) ---
# include:
#   - clients/acme-corp/docker-compose.yml

volumes:
  mariadb_data:
  redis_data:
  traefik_certs:

networks:
  moodle_network:
    driver: bridge
