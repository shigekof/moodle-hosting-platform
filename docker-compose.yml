---
# Shared infrastructure: Traefik, MariaDB, Redis
# Per-client Moodle services are assembled via include: directives below.
# Add a new client by running: scripts/add-client.sh <name> <domain>

name: moodle-hosting-platform

services:
  traefik:
    image: traefik:v3.1
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_certs:/letsencrypt
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
    environment:
      ACME_EMAIL: ${ACME_EMAIL}
      TRAEFIK_CERTIFICATESRESOLVERS_LETSENCRYPT_ACME_EMAIL: ${ACME_EMAIL}
    networks:
      - moodle_network
    labels:
      - "traefik.enable=false"

  mariadb:
    image: mariadb:11.8
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --innodb-buffer-pool-size=512M
      - --innodb-log-file-size=128M
      - --query-cache-type=0
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MARIADB_DATABASE: moodle
      MARIADB_USER: moodle
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - moodle_network
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7.2
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - moodle_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

# --- Per-client includes (added by scripts/add-client.sh) ---
include:
  - clients/demo/docker-compose.yml

volumes:
  mariadb_data:
  redis_data:
  traefik_certs:

networks:
  moodle_network:
    driver: bridge
